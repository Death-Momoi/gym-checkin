<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>社區健身房簽到系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

  <a id="btn-timeline" href="https://script.google.com/macros/s/AKfycbwTG5zmyBM1Zsiy78YnxXEATjApqRs-Z4xyZHJ4w58LHHRjGAC4dwyP5PAtGb1b-CgSBg/exec" target="_blank" class="hidden absolute top-4 left-4 flex items-center gap-1 bg-white px-3 py-2 rounded-full shadow text-blue-600 font-bold text-sm">
    <span class="material-icons text-lg">timeline</span> 時間軸
  </a>

  <div class="bg-white p-6 rounded-3xl shadow-xl w-full max-w-sm relative">
    
    <div id="step-bind" class="hidden">
      <h1 class="text-2xl font-bold text-center text-blue-600 mb-2">🔗 帳號綁定</h1>
      <p class="text-gray-500 mb-6 text-center text-sm">初次使用，請綁定您的 Google 帳號與姓名</p>
      
      <div class="space-y-4">
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-1">Google 帳號 (Email)</label>
          <input type="email" id="input-email" class="w-full p-3 border rounded-xl" placeholder="example@gmail.com">
        </div>
        <div>
          <label class="block text-gray-700 text-sm font-bold mb-1">真實姓名</label>
          <input type="text" id="input-name" class="w-full p-3 border rounded-xl" placeholder="請輸入姓名">
        </div>
        <button onclick="bindAccount()" class="w-full bg-blue-500 text-white p-3 rounded-xl font-bold text-lg hover:bg-blue-600 transition">完成綁定</button>
      </div>
    </div>

    <div id="step-main" class="hidden flex flex-col items-center">
      <p class="text-lg text-gray-600 mb-6">哈囉，<span id="display-name" class="font-bold text-blue-500"></span></p>
      
      <button id="btn-bubble" onclick="handleBubbleClick()" class="w-48 h-48 rounded-full shadow-lg text-white font-bold text-3xl flex items-center justify-center transition-all transform active:scale-95 duration-200">
        </button>

      <div id="role-selector" class="mt-8 bg-gray-50 p-2 rounded-xl flex gap-2 w-full justify-center">
        <label class="flex-1 text-center py-2 rounded-lg cursor-pointer transition-colors" id="label-role-main">
          <input type="radio" name="role" value="主要借用者" class="hidden"> 主要借用者
        </label>
        <label class="flex-1 text-center py-2 rounded-lg cursor-pointer transition-colors bg-white shadow-sm border" id="label-role-sub">
          <input type="radio" name="role" value="共同使用者" class="hidden" checked> 共同使用者
        </label>
      </div>
    </div>

    <div id="step-device" class="hidden">
      <h2 class="text-xl font-bold text-red-500 mb-4 text-center">⚠️ 簽退前確認</h2>
      <p class="text-gray-600 mb-4 text-center text-sm">您是主要借用者，請選擇您的操作：</p>
      
      <button onclick="submitSignOut('轉移')" class="w-full bg-orange-100 text-orange-600 border border-orange-300 p-3 rounded-xl font-bold text-md hover:bg-orange-200 mb-4 transition">
        🔄 轉移主要借用者給現場人員<br><span class="text-xs font-normal">（免檢查設備，直接離開）</span>
      </button>

      <div class="relative flex py-2 items-center">
        <div class="flex-grow border-t border-gray-300"></div>
        <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">或由您負責關閉</span>
        <div class="flex-grow border-t border-gray-300"></div>
      </div>

      <div class="space-y-3 my-4 bg-gray-50 border p-4 rounded-xl text-left">
        <label class="flex items-center space-x-3 text-gray-700 p-1 cursor-pointer">
          <input type="checkbox" id="chk-ac" class="w-5 h-5 rounded text-blue-500">
          <span>❄️ 冷氣 <b class="text-red-500">已關閉</b></span>
        </label>
        <label class="flex items-center space-x-3 text-gray-700 p-1 cursor-pointer">
          <input type="checkbox" id="chk-light" class="w-5 h-5 rounded text-blue-500">
          <span>💡 電燈 <b class="text-red-500">已關閉</b></span>
        </label>
        <label class="flex items-center space-x-3 text-gray-700 p-1 cursor-pointer">
          <input type="checkbox" id="chk-dehumidifier" class="w-5 h-5 rounded text-blue-500">
          <span>💧 除濕機 <b class="text-green-600">已開啟</b></span>
        </label>
      </div>
      <button onclick="submitSignOut('關閉設備')" class="w-full bg-red-500 text-white p-3 rounded-xl font-bold hover:bg-red-600 transition">確認簽退並離開</button>
    </div>

    <div id="msg" class="mt-4 text-center font-bold text-sm text-gray-500"></div>
  </div>

  <script>
    // =================【請記得貼上你的 GAS Web App URL】=================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwTG5zmyBM1Zsiy78YnxXEATjApqRs-Z4xyZHJ4w58LHHRjGAC4dwyP5PAtGb1b-CgSBg/exec";
    // ===========================================================================

    // 身分選擇器 UI 互動邏輯
    const radios = document.querySelectorAll('input[name="role"]');
    const labelMain = document.getElementById('label-role-main');
    const labelSub = document.getElementById('label-role-sub');

    radios.forEach(radio => {
      radio.addEventListener('change', function() {
        if(this.value === '主要借用者') {
          labelMain.classList.add('bg-white', 'shadow-sm', 'border', 'text-blue-600', 'font-bold');
          labelSub.classList.remove('bg-white', 'shadow-sm', 'border', 'text-blue-600', 'font-bold');
        } else {
          labelSub.classList.add('bg-white', 'shadow-sm', 'border', 'text-blue-600', 'font-bold');
          labelMain.classList.remove('bg-white', 'shadow-sm', 'border', 'text-blue-600', 'font-bold');
        }
      });
    });

    window.onload = function() {
      var savedEmail = localStorage.getItem('gym_email');
      var savedName = localStorage.getItem('gym_username');
      
      if (!savedEmail || !savedName) {
        document.getElementById('step-bind').classList.remove('hidden');
      } else {
        document.getElementById('btn-timeline').classList.remove('hidden');
        showMainPage(savedName);
      }
    };

    function bindAccount() {
      var email = document.getElementById('input-email').value.trim();
      var name = document.getElementById('input-name').value.trim();
      
      if (!email || !name) { alert('請填寫完整資訊！'); return; }
      
      localStorage.setItem('gym_email', email);
      localStorage.setItem('gym_username', name);
      localStorage.setItem('gym_status', 'checked_out'); 
      
      document.getElementById('btn-timeline').classList.remove('hidden');
      document.getElementById('step-bind').classList.add('hidden');
      showMainPage(name);
    }

    function showMainPage(name) {
      document.getElementById('step-main').classList.remove('hidden');
      document.getElementById('display-name').innerText = name;
      updateBubbleUI();
    }

    // 更新泡泡的狀態與顏色
    function updateBubbleUI() {
      var status = localStorage.getItem('gym_status') || 'checked_out';
      var bubble = document.getElementById('btn-bubble');
      var roleSelector = document.getElementById('role-selector');

      if (status === 'checked_out') {
        bubble.innerText = "簽到";
        bubble.className = "w-48 h-48 rounded-full shadow-lg text-white font-bold text-4xl flex items-center justify-center transition-all transform active:scale-95 duration-200 bg-gradient-to-br from-green-400 to-green-600 shadow-green-500/50";
        roleSelector.style.opacity = "1";
        roleSelector.style.pointerEvents = "auto";
      } else {
        bubble.innerText = "簽退";
        bubble.className = "w-48 h-48 rounded-full shadow-lg text-white font-bold text-4xl flex items-center justify-center transition-all transform active:scale-95 duration-200 bg-gradient-to-br from-red-400 to-red-600 shadow-red-500/50";
        // 簽到後鎖定身分選擇，避免亂切換
        roleSelector.style.opacity = "0.5";
        roleSelector.style.pointerEvents = "none";
      }
    }

    // 點擊大泡泡的處理邏輯
    function handleBubbleClick() {
      var status = localStorage.getItem('gym_status') || 'checked_out';
      
      if (status === 'checked_out') {
        processCheckIn();
      } else {
        processPreCheckOut();
      }
    }

    function processCheckIn() {
      var name = localStorage.getItem('gym_username');
      var email = localStorage.getItem('gym_email');
      var role = document.querySelector('input[name="role"]:checked').value;
      
      var bubble = document.getElementById('btn-bubble');
      bubble.innerText = "處理中...";

      var payload = { action: '簽到', name: name, email: email, role: role };

      fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(response => {
        bubble.innerText = "簽到成功";
        localStorage.setItem('gym_status', 'checked_in');
        localStorage.setItem('gym_current_role', role); // 記住這次簽到的身分
        
        // 等待 1.5 秒後把泡泡變紅改成簽退
        setTimeout(updateBubbleUI, 1500);
      })
      .catch(err => {
        alert("連線失敗，請重試");
        updateBubbleUI();
      });
    }

    function processPreCheckOut() {
      var role = localStorage.getItem('gym_current_role');
      
      if (role === '主要借用者') {
        // 主要借用者，跳轉到檢查/轉交畫面
        document.getElementById('step-main').classList.add('hidden');
        document.getElementById('step-device').classList.remove('hidden');
      } else {
        // 共同使用者，直接送出簽退
        var bubble = document.getElementById('btn-bubble');
        bubble.innerText = "處理中...";
        
        var payload = {
          action: '簽退',
          name: localStorage.getItem('gym_username'),
          email: localStorage.getItem('gym_email'),
          role: '共同使用者'
        };

        fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(() => {
          bubble.innerText = "簽退成功";
          localStorage.setItem('gym_status', 'checked_out');
          setTimeout(updateBubbleUI, 1500);
        });
      }
    }

    function submitSignOut(mode) {
      var payload = {
        action: '簽退',
        name: localStorage.getItem('gym_username'),
        email: localStorage.getItem('gym_email'),
        role: '主要借用者'
      };

      if (mode === '轉移') {
        payload.acCheck = "已轉交共同借用者";
        payload.lightCheck = "已轉交共同借用者";
        payload.dehumidifierCheck = "已轉交共同借用者";
      } else {
        var isAcChecked = document.getElementById('chk-ac').checked;
        var isLightChecked = document.getElementById('chk-light').checked;
        var isDehChecked = document.getElementById('chk-dehumidifier').checked;
        
        if (!isAcChecked || !isLightChecked || !isDehChecked) {
          alert('請確實逐項檢查：\n1. 冷氣已關閉\n2. 電燈已關閉\n3. 除濕機已開啟');
          return;
        }
        payload.acCheck = "已關閉";
        payload.lightCheck = "已關閉";
        payload.dehumidifierCheck = "已開啟"; // 💡 符合除濕機需開啟的邏輯
      }

      showLoading("正在記錄狀態....");
      
      fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) })
      .then(res => res.json())
      .then(() => {
        localStorage.setItem('gym_status', 'checked_out');
        showSuccess("👋 簽退成功！感謝您的配合！");
        
        // 3秒後自動回到大泡泡主畫面
        setTimeout(() => {
          document.getElementById('msg').innerText = "";
          document.getElementById('step-device').classList.add('hidden');
          document.getElementById('step-main').classList.remove('hidden');
          
          // 恢復核取方塊的預設未勾選狀態
          document.getElementById('chk-ac').checked = false;
          document.getElementById('chk-light').checked = false;
          document.getElementById('chk-dehumidifier').checked = false;
          
          updateBubbleUI();
        }, 3000);
      });
    }

    function showLoading(txt) {
      document.getElementById('msg').innerText = txt;
      document.getElementById('msg').className = "mt-4 text-center font-bold text-sm text-amber-500";
    }
    function showSuccess(txt) {
      document.getElementById('msg').innerText = txt;
      document.getElementById('msg').className = "mt-4 text-center font-bold text-md text-green-600";
    }
  </script>
</body>
</html>
