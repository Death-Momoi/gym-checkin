<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>社區健身房簽到系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">🏋️ 社區健身房系統</h1>
    
    <div id="step-name" class="hidden">
      <p class="text-gray-600 mb-4 text-center">歡迎初次使用！請輸入您的真實姓名：</p>
      <input type="text" id="username" class="w-full p-3 border rounded-xl mb-4 text-center text-lg" placeholder="請輸入姓名">
      <button onclick="saveName()" class="w-full bg-blue-500 text-white p-3 rounded-xl font-bold text-lg hover:bg-blue-600">確認送出</button>
    </div>

    <div id="step-action" class="hidden text-center">
      <p class="text-xl mb-4 text-gray-700">哈囉，<span id="display-name" class="font-bold text-blue-500"></span>！</p>
      <div class="grid grid-cols-2 gap-4">
        <button id="btn-checkin" onclick="handleAction('簽到')" class="bg-green-500 text-white p-6 rounded-2xl font-bold text-xl shadow hover:bg-green-600 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed">🟩 簽到</button>
        <button id="btn-checkout" onclick="handleAction('簽退')" class="bg-red-500 text-white p-6 rounded-2xl font-bold text-xl shadow hover:bg-red-600 disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed">🟥 簽退</button>
      </div>
      <p id="status-hint" class="text-sm text-gray-400 mt-4"></p>
    </div>

    <div id="step-device" class="hidden">
      <h2 class="text-xl font-bold text-red-500 mb-4 text-center">⚠️ 您是本次時段預約者</h2>
      <p class="text-gray-600 mb-4 text-center">離開前請確認已關閉以下設備：</p>
      <div class="space-y-3 mb-6 bg-red-50 p-4 rounded-xl text-left">
        <label class="flex items-center space-x-3 text-lg text-gray-700 p-1 hover:bg-red-100 rounded cursor-pointer">
          <input type="checkbox" id="chk-ac" class="w-5 h-5 rounded text-red-500">
          <span>❄️ 冷氣已關閉</span>
        </label>
        <label class="flex items-center space-x-3 text-lg text-gray-700 p-1 hover:bg-red-100 rounded cursor-pointer">
          <input type="checkbox" id="chk-dehumidifier" class="w-5 h-5 rounded text-red-500">
          <span>💧 除濕機已關閉</span>
        </label>
        <label class="flex items-center space-x-3 text-lg text-gray-700 p-1 hover:bg-red-100 rounded cursor-pointer">
          <input type="checkbox" id="chk-light" class="w-5 h-5 rounded text-red-500">
          <span>💡 電燈已關閉</span>
        </label>
      </div>
      <button onclick="submitDeviceCheck()" class="w-full bg-red-500 text-white p-3 rounded-xl font-bold text-lg hover:bg-red-600">確認簽退並離開</button>
    </div>

    <div id="msg" class="mt-4 text-center font-bold text-lg text-gray-500"></div>
  </div>

  <script>
    // =================【請記得貼上你的 GAS Web App URL】=================
    const GAS_URL = "請把你的GAS網址貼在這裡";
    // ===========================================================================

    window.onload = function() {
      var savedName = localStorage.getItem('gym_username');
      if (!savedName) {
        document.getElementById('step-name').classList.remove('hidden');
      } else {
        showActionPage(savedName);
      }
    };

    function saveName() {
      var name = document.getElementById('username').value.trim();
      if (!name) { alert('請輸入名字！'); return; }
      localStorage.setItem('gym_username', name);
      // 初次使用，預設狀態為「已簽退/未簽到」
      localStorage.setItem('gym_status', 'checked_out'); 
      showActionPage(name);
    }

    function showActionPage(name) {
      document.getElementById('step-name').classList.add('hidden');
      document.getElementById('step-action').classList.remove('hidden');
      document.getElementById('display-name').innerText = name;
      
      // 更新按鈕的可點擊狀態
      updateButtonUI();
    }

    // 核心控制：根據目前狀態控制按鈕開關
    function updateButtonUI() {
      var currentStatus = localStorage.getItem('gym_status') || 'checked_out';
      var btnCheckin = document.getElementById('btn-checkin');
      var btnCheckout = document.getElementById('btn-checkout');
      var hint = document.getElementById('status-hint');

      if (currentStatus === 'checked_in') {
        // 已簽到狀態 -> 只能簽退
        btnCheckin.disabled = true;
        btnCheckout.disabled = false;
        hint.innerText = "目前狀態：已在健身房中 🏋️";
      } else {
        // 未簽到/已簽退狀態 -> 只能簽到
        btnCheckin.disabled = false;
        btnCheckout.disabled = true;
        hint.innerText = "目前狀態：尚未簽到 🏠";
      }
    }

    function handleAction(action) {
      var name = localStorage.getItem('gym_username');
      var currentStatus = localStorage.getItem('gym_status') || 'checked_out';

      // 雙重防呆：阻擋不合理的點擊
      if (action === '簽到' && currentStatus === 'checked_in') return;
      if (action === '簽退' && currentStatus === 'checked_out') return;

      showLoading("處理中...");

      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ name: name, action: action })
      })
      .then(res => res.json())
      .then(response => {
        if (action === '簽到') {
          // 簽到成功，變更狀態為已簽到
          localStorage.setItem('gym_status', 'checked_in');
          showSuccess("🎉 簽到成功！祝您運動愉快！");
        } else {
          if (response.isPrimaryUser === "是") {
            hideLoading();
            document.getElementById('step-action').classList.add('hidden');
            document.getElementById('step-device').classList.remove('hidden');
          } else {
            // 共用者簽退成功，變更狀態為已簽退
            localStorage.setItem('gym_status', 'checked_out');
            showSuccess("👋 簽退成功！一路上小心！");
          }
        }
      })
      .catch(err => showSuccess("連線失敗，請重試。"));
    }

    function submitDeviceCheck() {
      var name = localStorage.getItem('gym_username');
      
      var isAcChecked = document.getElementById('chk-ac').checked;
      var isDehumidifierChecked = document.getElementById('chk-dehumidifier').checked;
      var isLightChecked = document.getElementById('chk-light').checked;
      
      if (!isAcChecked || !isDehumidifierChecked || !isLightChecked) {
        alert('請確實逐項檢查，並勾選確認「冷氣」、「除濕機」與「電燈」皆已關閉！');
        return;
      }

      showLoading("正在記錄設備狀態...");
      
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ 
          name: name, 
          action: '簽退', 
          acCheck: "已關閉",
          dehumidifierCheck: "已關閉",
          lightCheck: "已關閉"
        })
      })
      .then(res => res.json())
      .then(() => {
        // 預約者確認關閉設備後，變更狀態為已簽退
        localStorage.setItem('gym_status', 'checked_out');
        showSuccess("👋 設備已確認，簽退成功！感謝維持社區環境！");
      })
      .catch(err => showSuccess("連線失敗，請重試。"));
    }

    function showLoading(txt) {
      document.getElementById('msg').innerText = txt;
      document.getElementById('msg').className = "mt-4 text-center font-bold text-lg text-amber-500";
    }
    function hideLoading() { document.getElementById('msg').innerText = ""; }
    function showSuccess(txt) {
      document.getElementById('step-action').className = "hidden";
      document.getElementById('step-device').className = "hidden";
      document.getElementById('msg').innerText = txt;
      document.getElementById('msg').className = "mt-4 text-center font-bold text-xl text-green-600";
    }
  </script>
</body>
</html>
